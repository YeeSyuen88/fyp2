<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Price Estimator | Malaysia FYP</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f5f5f5; }
    .container { max-width: 560px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .nav { margin-bottom: 20px; }
    .nav a { color: #06c; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; }
    .form-group select, .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #06c; }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #0a5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button[type="submit"]:hover { background: #084; }
    button[type="submit"]:disabled { background: #999; cursor: not-allowed; }
    .result { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
    .result.visible { display: block; }
    .result h3 { margin: 0 0 12px 0; font-size: 1.1rem; }
    .result .row { display: flex; justify-content: space-between; margin: 8px 0; }
    .result .label { color: #666; }
    .result .value { font-weight: 600; color: #0a5; }
    .result .flood { color: #c00; }
    .error { color: #c00; margin-top: 12px; }
    .loading { color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav"><a href="/">← Back to Map</a></div>
    <h1>Property Price &amp; Area Info</h1>
    <p style="color:#666; margin-bottom:20px;">Select state, district (optional) and property type to see predicted future 1-month price, floor area range, number of rooms range and flood risk.</p>

    <div class="card">
      <form id="estimator-form">
        <div class="form-group">
          <label for="state">State</label>
          <select id="state" required>
            <option value="">-- Select state --</option>
          </select>
        </div>
        <div class="form-group">
          <label for="district">District <span style="font-weight:400; color:#666;">(optional)</span></label>
          <select id="district">
            <option value="">-- Any --</option>
          </select>
        </div>
        <div class="form-group">
          <label for="property_type">Property Type</label>
          <select id="property_type" required>
            <option value="">-- Select type --</option>
          </select>
        </div>
        <button type="submit" id="btn-submit">Show Result</button>
      </form>
      <div id="error" class="error"></div>
      <div id="result" class="result">
        <h3>Result</h3>
        <div class="row"><span class="label">Predicted price (1 month)</span><span class="value" id="out-predicted">—</span></div>
        <div class="row"><span class="label">Floor area range (sq ft)</span><span class="value" id="out-floor-range">—</span></div>
        <div class="row"><span class="label">Number of rooms range</span><span class="value" id="out-rooms-range">—</span></div>
        <div class="row"><span class="label">Flood risk</span><span class="value flood" id="out-flood">—</span></div>
      </div>
    </div>
  </div>
  <script src="estimator.js"></script>
</body>
</html>
