<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malaysia Property Price &amp; Flood Risk Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; }
    #map { width: 100vw; height: 100vh; }
    .layer-toggle {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      background: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .layer-toggle label { margin-right: 8px; }
    .layer-toggle select { padding: 4px 8px; }
    .info-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      max-width: 380px;
      display: none;
    }
    .info-panel.visible { display: block; }
    .info-panel h3 { margin: 0 0 8px 0; font-size: 1.1rem; }
    .info-panel p { margin: 4px 0; }
    .info-panel .price { font-weight: 600; color: #0a5; }
    .info-panel .flood { color: #c00; }
    .info-panel .chart-wrap { margin-top: 10px; height: 180px; position: relative; }
    .info-panel .chart-wrap canvas { max-height: 180px; }
  </style>
</head>
<body>
  <div class="layer-toggle">
    <a href="/estimator.html" style="margin-right:12px; color:#06c; text-decoration:none;">Price Estimator</a>
    <label for="layer">View by:</label>
    <select id="layer">
      <option value="state">State</option>
      <option value="district">District</option>
    </select>
  </div>
  <div id="info" class="info-panel"></div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
